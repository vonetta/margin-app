name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # CI=true makes CRA treat lint warnings as errors — the exact
    # condition that failed a Vercel deploy once but passed local tests.
    env:
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npx react-scripts test --watchAll=false

      - run: npm run build
